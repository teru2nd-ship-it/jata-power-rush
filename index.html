}
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;

// ---------- サウンド（WebAudio BGM / 効果音） ----------
let AC=null;
let muted = localStorage.getItem('jataPowerRushMuted') === '1';
let bgmTimer=null, bgmStep=0;
const BGM_MELODY = [293.66,0,392.00,440.00,523.25,0,440.00,392.00,329.63,0,392.00,293.66,261.63,0,329.63,392.00];
const BGM_BASS = [146.83,146.83,196.00,196.00,130.81,130.81,164.81,146.83];
function ensureAudio(){
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume().catch(()=>{});
    return AC;
  }catch(e){ return null; }
}
function scheduleTone(freq,dur,type='square',vol=0.15,slide=0,when=0){
  if(muted) return;
  const ac=ensureAudio(); if(!ac) return;
  const start=ac.currentTime+when;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,start);
  if(slide) o.frequency.linearRampToValueAtTime(Math.max(30,freq+slide),start+dur);
  g.gain.setValueAtTime(0.001,start);
  g.gain.exponentialRampToValueAtTime(Math.max(0.001,vol),start+0.012);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(start); o.stop(start+dur+0.02);
}
function beep(freq,dur,type='square',vol=0.15,slide=0){
  scheduleTone(freq,dur,type,vol,slide,0);
}
function noise(dur=0.08,vol=0.04,cutoff=1800){
  if(muted) return;
  const ac=ensureAudio(); if(!ac) return;
  const frames=Math.max(1,Math.floor(ac.sampleRate*dur));
  const buffer=ac.createBuffer(1,frames,ac.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<frames;i++) data[i]=(Math.random()*2-1)*(1-i/frames);
  const src=ac.createBufferSource(), filter=ac.createBiquadFilter(), gain=ac.createGain();
  src.buffer=buffer; filter.type='bandpass'; filter.frequency.value=cutoff; filter.Q.value=0.8;
  gain.gain.setValueAtTime(vol,ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  src.connect(filter); filter.connect(gain); gain.connect(ac.destination); src.start();
}
function bgmTick(){
  if(muted) return;
  const note=BGM_MELODY[bgmStep%BGM_MELODY.length];
  if(note) scheduleTone(note,0.18,'square',0.018,0,0.01);
  if(bgmStep%2===0){
    const bass=BGM_BASS[Math.floor(bgmStep/2)%BGM_BASS.length];
    scheduleTone(bass,0.34,'triangle',0.026,0,0.01);
  }
  if(bgmStep%4===0) scheduleTone(92,0.13,'sine',0.035,-42,0.01);
  bgmStep++;
}
function startBgm(){
  if(muted || bgmTimer) return;
  if(!ensureAudio()) return;
  bgmTick();
  bgmTimer=setInterval(bgmTick,230);
}
function stopBgm(){
  if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; }
}
function setMuted(next){
  muted=!!next;
  localStorage.setItem('jataPowerRushMuted',muted?'1':'0');
  bonusMovie.muted=muted;
  if(muted) stopBgm();
  else if(!endingExperience.classList.contains('is-visible')) startBgm();
  window.dispatchEvent(new CustomEvent('power-rush-audio-change',{detail:{enabled:!muted}}));
}
window.togglePowerRushAudio=()=>setMuted(!muted);
window.powerRushAudioEnabled=()=>!muted;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden) stopBgm();
  else if(!muted && state!==S.TITLE && state!==S.ENDING) startBgm();
});
const SFX = {
  choice(){ beep(520,0.08,'triangle',0.08,120); },
  start(){ [293.66,392,523.25].forEach((f,i)=>scheduleTone(f,0.16,'square',0.08,0,i*0.08)); },
  eat(){ noise(0.07,0.045,2100); beep(300,0.12,'square',0.11,300); setTimeout(()=>beep(600,0.1,'square',0.09,200),60); },
  grow(){ beep(500,0.15,'triangle',0.13,400); },
  chest(){ beep(700,0.1,'sine',0.15); setTimeout(()=>beep(900,0.1,'sine',0.15),80); setTimeout(()=>beep(1200,0.15,'sine',0.15),160); },
  lose(){ noise(0.18,0.055,430); beep(200,0.3,'sawtooth',0.14,-120); },
  boss(){ noise(0.1,0.05,900); beep(150,0.25,'sawtooth',0.16,-50); },
  clear(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle',0.15),i*110)); },
  tapNG(){ beep(160,0.12,'square',0.12,-60); },
};

// ---------- ゲーム状態 ----------
const FINAL_STAGE = 30;
const WAR_GROUPS = 9;
const WAR_GROUP_SIZE = 6;
const WAR_START_POWER = 5;
const FISHING_CATCHES = [
  ['clam','sea-bream','pearl-shell','flounder','crab','green-fish'],
  ['sea-bream','crab','flounder','clam','green-fish','lobster'],
  ['pearl-shell','flounder','crab','sea-bream','lobster','green-fish'],
];
const FISHING_BIG_CATCHES = ['sea-bream','lobster','green-fish'];
const S = { TITLE:0, PLAY:1, ATTACK:2, DEAD:3, CLEAR:4, GAMEOVER:5, ENDING:6, WAR_END:7 };
let state = S.TITLE;
let level = 1;
let bestLevel = Number(localStorage.getItem('jataPowerRushBest') || 1);
let selectedHero = localStorage.getItem('jataPowerRushHero') === 'tabby' ? 'tabby' : 'black';
let endlessMode = false;
let noMissRun = true;
let endingBonusUnlocked = false;
let gameMode = 'training';
let warCameraY = 0;
let warWorldHeight = 0;
let warStartY = 0;
let warBossY = 0;
let warInitialCameraY = 0;
let warGroupCenters = [];
let player = { power:5, x:0, y:0, tx:0, ty:0, scale:1, face:1, walk:0 };
let enemies = [];   // {x,y,val,r,type,dead,popT,shake,hue,bob}
let particles = []; // {x,y,vx,vy,life,col,size,txt}
let floatTexts = [];
let attackTarget = null;
let attackPhase = 0, attackT = 0;
let shakeScreen = 0;
let flashCol = null, flashA = 0;
let time = 0;

// ---------- レベル生成（必ず解ける順番が存在する設計） ----------
function genLevel(n){
  enemies = [];
  // インフレは「初期パワー」に掛ける（敵の生成は常にチェーン保証内）
  const diff = 1 + (n-1)*0.55;
  const startPower = Math.max(5, Math.round(5*diff));
  player.power = startPower;
  const count = Math.min(5 + Math.floor(n/2), 9); // 敵の数

  // 「正しい順に食えば必ずボスまで届く」数列を作る
  // 各敵は必ず「その時点の累計パワー未満」＝詰み不可能
  let cum = startPower;
  const vals = [];
  for(let i=0;i<count;i++){
    const hi = cum - 1;                            // 厳密に自分未満
    const lo = Math.max(1, Math.floor(cum*0.35));
    const v = Math.max(1, Math.min(hi, lo + Math.floor(Math.random()*(hi-lo+1))));
    vals.push(v);
    cum += v;
  }
  // ボス値はギミック配置後に計算（下部参照）

  // 配置（縦長マップに散らす／プレイヤーは下）
  const shortStage = H < 650;
  const areaTop = H*(shortStage ? 0.18 : 0.22), areaBot = H*0.62;
  const minSpacing = Math.min(W,H)*0.19;
  const bossX = W*0.5, bossY = H*0.15;
  const plannedGateY = n>=3
    ? (shortStage ? H*0.37 : Math.min(areaBot-28, Math.max(areaTop+28, H*0.30 + Math.random()*H*0.18)))
    : null;
  const shortSpotPool = shortStage ? [
    {x:W*0.16,y:H*0.27}, {x:W*0.50,y:H*0.27}, {x:W*0.84,y:H*0.27},
    {x:W*0.16,y:H*0.50}, {x:W*0.50,y:H*0.50}, {x:W*0.84,y:H*0.50},
    {x:W*0.25,y:H*0.60}, {x:W*0.75,y:H*0.60},
    {x:W*0.16,y:H*0.70}, {x:W*0.50,y:H*0.70}, {x:W*0.84,y:H*0.70},
  ] : [];
  const usedSpots = [{x:bossX,y:bossY,gap:Math.max(88,minSpacing)}];
  if(plannedGateY!==null){
    usedSpots.push(
      {x:W*0.30,y:plannedGateY,gap:Math.max(96,minSpacing)},
      {x:W*0.70,y:plannedGateY,gap:Math.max(96,minSpacing)}
    );
  }
  function spot(){
    if(shortSpotPool.length){
      const p = shortSpotPool.shift();
      usedSpots.push({...p,gap:minSpacing});
      return p;
    }
    for(let t=0;t<120;t++){
      const x = W*(0.18 + Math.random()*0.64);
      const y = areaTop + Math.random()*(areaBot-areaTop);
      if(usedSpots.every(s=>Math.hypot(s.x-x,s.y-y) > Math.max(minSpacing,s.gap||0))){
        usedSpots.push({x,y,gap:minSpacing}); return {x,y};
      }
    }
    let best = null, bestClearance = -Infinity;
    for(let t=0;t<80;t++){
      const p={x:W*(0.18+Math.random()*0.64),y:areaTop+Math.random()*(areaBot-areaTop)};
      const clearance = Math.min(...usedSpots.map(s=>Math.hypot(s.x-p.x,s.y-p.y)-Math.max(minSpacing,s.gap||0)));
      if(clearance>bestClearance){ best=p; bestClearance=clearance; }
    }
    usedSpots.push({...best,gap:minSpacing}); return best;
  }
  // シャッフルして配置（見た目上は順番バラバラ＝考える要素）
  const shuffled = vals.slice().sort(()=>Math.random()-0.5);
  shuffled.forEach(v=>{
    const p = spot();
    enemies.push(mkEnemy(p.x,p.y,v,'grunt'));
  });
  const sumAll = cum - startPower; // 敵の合計

  // 追加の竹（従来の中ボス枠）：数字バランスを変えず通常敵として扱う。
  let bonusBambooVal = 0;
  const forceBonusBamboo = new URLSearchParams(window.location.search).get('bonusbamboo')==='1';
  if(n>=2 && (forceBonusBamboo || Math.random()<0.5)){
    const p = spot();
    bonusBambooVal = Math.max(2,Math.floor(cum*0.10));
    enemies.push(mkEnemy(p.x,p.y, bonusBambooVal, 'grunt'));
  }

  // ×2マタタビ（レベル2以降）：最後に取るほど伸びる猫用バフ。
  let hasMult = false;
  if(n>=2){
    hasMult = true;
    const p = spot();
    enemies.push(mkEnemy(p.x,p.y, 2, 'mult'));
  }

  // 忍術の二択（レベル3以降）：「+A」vs「×1.5」、選ばなかった忍者は退く。
  let gateAdd = 0, hasGate = false;
  if(n>=3){
    hasGate = true;
    gateAdd = Math.max(3, Math.floor(sumAll * (0.35 + Math.random()*0.25)));
    const g1 = mkEnemy(W*0.30, plannedGateY, gateAdd, 'gate'); g1.gkind='add';  g1.pair=1;
    const g2 = mkEnemy(W*0.70, plannedGateY, 1.5,     'gate'); g2.gkind='mul';  g2.pair=1;
    enemies.push(g1, g2);
  }

  // ボス：最適ルート（竹を全部斬る→忍術を選ぶ→マタタビを最後に取る）の 88〜94%
  // → マタタビを序盤で使うと届かない＝「後半に取らないと詰む」
  const base = startPower + sumAll + bonusBambooVal;
  const routeA = hasGate ? (base + gateAdd) : base;           // 加算の術
  const routeB = hasGate ? Math.floor(base * 1.5) : base;      // 増幅の術
  const best = Math.max(routeA, routeB) * (hasMult ? 2 : 1);
  const bossVal = Math.max(2, Math.min(best-1, Math.floor(best * (0.88 + Math.random()*0.06))));

  // ボスは上部中央
  enemies.push(mkEnemy(bossX, bossY, bossVal, 'boss'));

  player.x = player.tx = W*0.5;
  player.y = player.ty = H*(shortStage ? 0.89 : 0.74);
  player.scale = 1;
}

function clamp(value,min,max){ return Math.max(min,Math.min(max,value)); }
function warScreenY(worldY){ return gameMode==='war' ? worldY-warCameraY : worldY; }
function warTopInset(){ return Math.max(110,H*0.17); }
function warProgress(){
  if(gameMode!=='war' || warInitialCameraY<=0) return 0;
  return clamp((warInitialCameraY-warCameraY)/warInitialCameraY,0,1);
}
function currentWarGroup(){
  const field=enemies.filter(en=>!en.dead && en.type!=='boss');
  if(!field.length) return WAR_GROUPS;
  return Math.min(...field.map(en=>en.group));
}
function genWarMap(){
  enemies=[];
  gameMode='war';
  level=FINAL_STAGE;
  warWorldHeight=H*10.2;
  warStartY=warWorldHeight-H*0.18;
  warBossY=Math.max(150,H*0.20);
  warGroupCenters=[];

  const routeDistance=warStartY-warBossY;
  const groupStep=routeDistance/(WAR_GROUPS+0.3);
  const slots=[
    {x:0.18,dy:0.18},{x:0.50,dy:0.18},{x:0.82,dy:0.18},
    {x:0.18,dy:-0.14},{x:0.50,dy:-0.14},{x:0.82,dy:-0.14},
  ];
  const ratios=[0.25,0.42,0.68,0.95,1.35,1.90];
  const layouts=[
    [0,4,1,3,5,2],
    [3,0,5,1,2,4],
    [4,2,0,5,1,3],
  ];
  let projectedPower=WAR_START_POWER;

  for(let group=0;group<WAR_GROUPS;group++){
    const centerY=warStartY-(group+0.35)*groupStep;
    warGroupCenters.push(centerY);
    const groupStartPower=projectedPower;
    const values=ratios.map(ratio=>Math.max(1,Math.floor(groupStartPower*ratio)));
    const layout=layouts[group%layouts.length];
    for(let local=0;local<WAR_GROUP_SIZE;local++){
      const valueIndex=layout[local];
      const value=values[valueIndex];
      const slot=slots[local];
      const type=[2,5,8].includes(group) && valueIndex===ratios.length-1 ? 'midboss' : 'grunt';
      const enemy=mkEnemy(W*slot.x,centerY+H*slot.dy,value,type);
      enemy.catchKind=type==='midboss'
        ? FISHING_BIG_CATCHES[Math.floor(group/3)]
        : FISHING_CATCHES[group%FISHING_CATCHES.length][local];
      enemy.group=group;
      enemy.order=group*WAR_GROUP_SIZE+local;
      enemy.valueRank=valueIndex;
      enemies.push(enemy);
    }
    projectedPower+=values.reduce((sum,value)=>sum+value,0);
  }

  const bossValue=Math.min(projectedPower-1,Math.max(100000001,Math.floor(projectedPower*0.84)));
  const boss=mkEnemy(W*0.5,warBossY,bossValue,'boss');
  boss.catchKind='tuna';
  boss.r=H<650?100:120;
  boss.group=WAR_GROUPS;
  boss.order=WAR_GROUPS*WAR_GROUP_SIZE;
  enemies.push(boss);

  player.power=WAR_START_POWER;
  player.x=player.tx=W*0.5;
  player.y=player.ty=warStartY;
  player.scale=1;
  warCameraY=clamp(warGroupCenters[0]-H*0.44,0,Math.max(0,warWorldHeight-H));
  warInitialCameraY=warCameraY;
}

window.addEventListener('resize',()=>{
  if(gameMode!=='war' || state===S.TITLE) return;
  const progress=warProgress();
  const currentPower=player.power;
  const deadOrders=new Set(enemies.filter(en=>en.dead).map(en=>en.order));
  genWarMap();
  enemies.forEach(en=>{
    if(deadOrders.has(en.order)){ en.dead=true; en.popT=1; }
  });
  player.power=currentPower;
  const activeGroup=currentWarGroup();
  player.y=player.ty=activeGroup<WAR_GROUPS ? warGroupCenters[activeGroup]+H*0.48 : warBossY+H*0.58;
  warCameraY=warInitialCameraY*(1-progress);
  attackTarget=null;
  if(state===S.ATTACK || state===S.DEAD) state=S.PLAY;
});

function mkEnemy(x,y,val,type){
  const compact = H < 650 ? 0.82 : 1;
  return { x,y,val,type, dead:false, popT:0, shake:0,
    r: (type==='boss' ? 46 : type==='midboss' ? 38 : type==='mult' ? 26 : type==='gate' ? 40 : 30) * compact,
    hue: 0 + Math.random()*20, bob: Math.random()*Math.PI*2 };
}

function rememberBest(stage){
  if(stage <= bestLevel) return;
  bestLevel = stage;
  localStorage.setItem('jataPowerRushBest', String(bestLevel));
}
function onTap(e){
  e.preventDefault();
  const p = pointer(e);
  if(state === S.TITLE){
    const heroHit = titleHeroLayout().find(item =>
      Math.abs(p.x-item.x) < 58 && p.y > item.y-item.h-8 && p.y < item.y+38
    );
    if(heroHit){
      selectedHero = heroHit.key;
      localStorage.setItem('jataPowerRushHero', selectedHero);
      SFX.choice();
      return;
    }
    const modeHit=titleModeLayout().find(item=>
      p.x>item.x-item.w/2 && p.x<item.x+item.w/2 && p.y>item.y-item.h/2 && p.y<item.y+item.h/2
    );
    if(modeHit){
      if(modeHit.mode==='war') startFishingGame(); else startGame();
    }
    return;
  }
  if(state === S.CLEAR){
    if(gameMode!=='war'){
      level++;
      rememberBest(level);
      genLevel(level);
    }
    state=S.PLAY; return;
  }
  if(state === S.ENDING){
    returnToTitle(); return;
  }
  if(state === S.WAR_END){ showFishingEnding(); return; }
  if(state === S.GAMEOVER){
    if(gameMode==='war') genWarMap();
    else genLevel(level);
    state=S.PLAY; return;
  }
  if(state !== S.PLAY) return;

  // 敵タップ判定
  let hit=null;
  for(const en of enemies){
    if(en.dead) continue;
    const enemyScreenY=warScreenY(en.y);
    if(gameMode==='war' && (enemyScreenY<warTopInset() || enemyScreenY>H+20)) continue;
    const rr = en.r + 22;
    if(Math.hypot(en.x-p.x, enemyScreenY-p.y) < rr){ hit=en; break; }
  }
  if(!hit) return;

  const safe = (hit.type==='mult' || hit.type==='gate');
  if(!safe && hit.val >= player.power){
    // 挑んだら負けるやつ → 突撃して敗北演出
    attackTarget = hit; attackPhase = 0; attackT = 0;
    state = S.ATTACK; attackTarget.lose = true;
    SFX.boss();
  } else {
    attackTarget = hit; attackPhase = 0; attackT = 0;
    attackTarget.lose = false;
    state = S.ATTACK;
  }
}

function startGame(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('mode')==='fishing' || params.get('mode')==='war'){

  }
  hideEndingExperience();
  gameMode='training';
  const heroParam = params.get('hero');
  if(heroParam === 'black' || heroParam === 'tabby'){
    selectedHero = heroParam;
    localStorage.setItem('jataPowerRushHero', selectedHero);
  }
  const requestedStage = Number(params.get('stage'));
  level = Number.isInteger(requestedStage) && requestedStage > 0 ? Math.min(requestedStage,99) : 1;
  if(params.get('ending') === '1') level = FINAL_STAGE;
  endlessMode = level > FINAL_STAGE;
  noMissRun = level===1 || params.get('perfect')==='1';
  endingBonusUnlocked = false;
  genLevel(level);
  if(params.get('ending') === '1'){
    state = S.ENDING;
    endingBonusUnlocked = noMissRun;
    showEndingCard();

    state = S.PLAY;
    startBgm();
  }

}

// ---------- パーティクル・演出 ----------
function burst(x,y,col,n=14){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, sp = 2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,col,size:3+Math.random()*5});
  }
}
function floatUp(x,y,txt,col){
  floatTexts.push({x,y,txt,col,life:1});
}

// ---------- 更新 ----------
function update(dt){
  time += dt;
  if(shakeScreen>0) shakeScreen = Math.max(0, shakeScreen - dt*30);
  if(flashA>0) flashA = Math.max(0, flashA - dt*2.5);

  particles.forEach(pt=>{ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.25; pt.life-=dt*1.8; });
  particles = particles.filter(pt=>pt.life>0);
  floatTexts.forEach(f=>{ f.y-=dt*60; f.life-=dt*0.9; });
  floatTexts = floatTexts.filter(f=>f.life>0);

  enemies.forEach(en=>{
    en.bob += dt*3;
    if(en.shake>0) en.shake -= dt*10;
    if(en.dead && en.popT<1) en.popT += dt*4;
  });

  if(gameMode==='war'){
    if(state===S.PLAY){
      const activeGroup=currentWarGroup();
      const targetY=activeGroup<WAR_GROUPS ? warGroupCenters[activeGroup]+H*0.18 : warBossY+H*0.42;
      if(player.y>targetY+H*0.18){
        player.y-=Math.min(H*0.75*dt,player.y-targetY-H*0.18);
        player.walk+=dt*10;
      }
    }
    const activeGroup=currentWarGroup();
    const desiredCamera=activeGroup<WAR_GROUPS
      ? clamp(warGroupCenters[activeGroup]-H*0.44,0,Math.max(0,warWorldHeight-H))
      : 0;
    warCameraY+=(desiredCamera-warCameraY)*Math.min(1,dt*1.8);
  }

  if(state === S.ATTACK && attackTarget){
    attackT += dt;
    const tg = attackTarget;
    if(attackPhase===0){
      // 突撃
      const dx=tg.x-player.x, dy=tg.y-player.y, d=Math.hypot(dx,dy);
      player.face = dx>=0?1:-1;
      player.walk += dt*16;
      const sp = Math.max(600, d*4)*dt;
      if(d < tg.r+18){
        attackPhase=1; attackT=0;
        if(tg.lose){
          // 敗北
          noMissRun=false;
          shakeScreen=8; flashCol='#e33'; flashA=0.6;
          SFX.lose(); burst(player.x,player.y,'#ff5555',20);
          gameOverMsg='';
          state = S.DEAD; deadT=0;
        } else {
          // 撃破・取得
          shakeScreen=4;
          tg.dead=true; tg.popT=0;
          if(tg.type==='mult'){
            SFX.chest(); flashCol='#9cff6b'; flashA=0.4;
            burst(tg.x,tg.y,'#9cff6b',18);
            player.power *= 2;
            floatUp(tg.x, tg.y-40, 'マタタビ ×2!', '#9cff6b');
          } else if(tg.type==='gate'){
            // 選ばなかった忍者は退く。
            enemies.forEach(e=>{ if(e.type==='gate' && e!==tg && e.pair===tg.pair){ e.dead=true; e.popT=0; } });
            SFX.chest(); flashCol='#5ad1ff'; flashA=0.35;
            burst(tg.x,tg.y,'#5ad1ff',16);
            if(tg.gkind==='mul'){
              player.power = Math.floor(player.power * tg.val);
              floatUp(tg.x, tg.y-40, '×'+tg.val, '#5ad1ff');
            } else {
              player.power += tg.val;
              floatUp(tg.x, tg.y-40, '+'+tg.val, '#5ad1ff');
            }
          } else {
            SFX.eat();
            burst(tg.x,tg.y,'#ff7a4d',16);
            player.power += tg.val;
            floatUp(tg.x, tg.y-40, '+'+formatPower(tg.val), '#7dff8a');
          }
          SFX.grow();
          player.scale = 1.25; // 食べたら一瞬デカくなる
        }
      } else {
        player.x += dx/d*sp; player.y += dy/d*sp;
      }
    } else if(attackPhase===1){
      if(attackT>0.25){
        // 残敵チェック
        const bossAlive = enemies.some(e=>!e.dead && e.type==='boss');
        if(!bossAlive){
          if(gameMode==='war'){
            state=S.WAR_END;
            stopBgm();
          } else if(level===FINAL_STAGE && !endlessMode){
            rememberBest(level);
            state=S.ENDING;
            endingBonusUnlocked=noMissRun;
            showEndingCard();
          } else {
            rememberBest(level);
            state=S.CLEAR;
          }
          SFX.clear(); flashCol='#7dff8a'; flashA=0.4;
        }
        else if(isStuck()){ // 保険：倒せる敵ゼロ＝詰み → 自動リトライ画面
          noMissRun=false;
          gameOverMsg=gameMode==='war'?'これ以上釣れる獲物がいない…':'倒せる敵がいない…詰み！';
          shakeScreen=6; flashCol='#e33'; flashA=0.5; SFX.lose();
          state = S.GAMEOVER;
        }
        else state = S.PLAY;
        attackTarget=null;
      }
    }
  }

  if(state === S.DEAD){
    deadT += dt;
    if(deadT>0.9){ state = S.GAMEOVER; }
  }

  // プレイヤーのスケールを戻す
  player.scale += (1-player.scale)*dt*4;
  // サイズ感：パワーに応じてちょい成長
  // (見た目の暴走防止で上限あり)
}
let deadT=0;
let gameOverMsg='';
function isStuck(){
  let alive = enemies.filter(e=>!e.dead);
  if(alive.length===0) return false;
  if(gameMode==='war'){
    const activeGroup=currentWarGroup();
    alive=activeGroup<WAR_GROUPS
      ? alive.filter(e=>e.type!=='boss' && e.group===activeGroup)
      : alive.filter(e=>e.type==='boss');
  }
  return !alive.some(e=>e.type==='mult' || e.type==='gate' || e.val < player.power);
}

// ---------- 描画ヘルパー ----------
function roundRect(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath();
}
function numBadge(x,y,txt,col='#fff',stroke='#c92a2a',size=26){
  cx.save();
  cx.font = '900 '+size+'px '+FONT_JP;
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.lineWidth = size*0.28; cx.strokeStyle=stroke; cx.lineJoin='round';
  cx.strokeText(txt,x,y);
  cx.fillStyle=col; cx.fillText(txt,x,y);
  cx.restore();
}
function formatPower(value){
  const n=Math.max(0,Math.floor(Number(value)||0));
  if(n<10000) return String(n);
  if(n>=100000000){
    const oku=Math.floor(n/100000000);
    const remainder=n%100000000;
    if(remainder===0) return oku+'億';
    if(remainder<10000) return oku+'億'+remainder;
    return oku+'億'+Math.floor(remainder/10000)+'万';
  }
  const unit=n>=100000000?'億':'万';
  const base=unit==='億'?100000000:10000;
  const amount=n/base;
  const digits=amount>=100?0:amount>=10?1:2;
  let text=amount.toFixed(digits);
  if(text.includes('.')) text=text.replace(/0+$/,'').replace(/\.$/,'');
  return text+unit;
}

// ---------- キャラ描画 ----------
function drawHero(x,y,scale,face){
  const art = gameMode==='war'
    ? (selectedHero==='tabby' ? ART.tabbyCatFisher : ART.blackCatFisher)
    : (selectedHero==='tabby' ? ART.tabbyCatHero : ART.blackCatHero);
  if(!imageReady(art)){ drawHeroFallback(x,y,scale,face); return; }
  cx.save();
  cx.translate(x,y); cx.scale(scale*face, scale);
  const g = 1 + Math.min(0.6, Math.log10(Math.max(1,player.power))*0.18);
  cx.scale(g,g);
  cx.fillStyle='rgba(0,0,0,0.28)';
  cx.beginPath(); cx.ellipse(0,35,28,8,0,0,Math.PI*2); cx.fill();
  cx.translate(0,Math.sin(player.walk)*1.5);
  const spriteH = gameMode==='war' ? (H<650?94:108) : (H<650?80:92);
  const spriteW = art.naturalWidth * (spriteH/art.naturalHeight);
  cx.imageSmoothingEnabled=false;
  cx.drawImage(art,-spriteW/2,35-spriteH,spriteW,spriteH);
  cx.restore();
}
function drawHeroFallback(x,y,scale,face){
  cx.save();
  cx.translate(x,y); cx.scale(scale*face, scale);
  const g = 1 + Math.min(0.6, Math.log10(Math.max(1,player.power))*0.18); // パワーで少し巨大化
  cx.scale(g,g);
  // 影
  cx.fillStyle='rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(0,34,26,8,0,0,Math.PI*2); cx.fill();
  const step = Math.sin(player.walk)*4;
  // 脚
  cx.fillStyle='#1f3a5f';
  roundRect(-12,10+step*0.3,10,24,4); cx.fill();
  roundRect(2,10-step*0.3,10,24,4); cx.fill();
  // 稽古着
  cx.fillStyle='#f1ead8';
  roundRect(-16,-14,32,30,10); cx.fill();
  cx.strokeStyle='#b9aa90'; cx.lineWidth=2; roundRect(-16,-14,32,30,10); cx.stroke();
  cx.fillStyle='#a52d2d';
  roundRect(-16,8,32,6,2); cx.fill();
  if(gameMode==='war'){
    // 竹竿とタモ網
    cx.strokeStyle='#b87b36'; cx.lineWidth=5;
    cx.beginPath(); cx.moveTo(-11,5); cx.lineTo(-28,-58); cx.stroke();
    cx.strokeStyle='#e8eef5'; cx.lineWidth=1.5;
    cx.beginPath(); cx.moveTo(-28,-58); cx.lineTo(-35,-6); cx.stroke();
    cx.fillStyle='#e34f55'; cx.beginPath(); cx.arc(-35,-4,4,0,Math.PI*2); cx.fill();
    cx.strokeStyle='#b87b36'; cx.lineWidth=4;
    cx.beginPath(); cx.moveTo(13,5); cx.lineTo(27,28); cx.stroke();
    cx.strokeStyle='#d9e2e8'; cx.lineWidth=2;
    cx.beginPath(); cx.arc(31,32,13,0,Math.PI*2); cx.stroke();
  } else {
    // 木刀
    cx.save(); cx.translate(20,-4); cx.rotate(-0.5);
    cx.fillStyle='#a86f3c'; roundRect(-3,-34,7,34,3); cx.fill();
    cx.fillStyle='#d59a57'; roundRect(-3,-34,3.5,34,2); cx.fill();
    cx.fillStyle='#1f3a5f'; roundRect(-6,-2,13,6,3); cx.fill();
    cx.restore();
  }
  // 頭
  cx.fillStyle='#ffd9b3';
  cx.beginPath(); cx.arc(0,-28,15,0,Math.PI*2); cx.fill();
  // 髪
  cx.fillStyle='#16273f';
  cx.beginPath(); cx.arc(0,-32,15,Math.PI*1.05,Math.PI*1.95); cx.lineTo(10,-30); cx.lineTo(4,-38); cx.lineTo(-2,-31); cx.lineTo(-8,-39); cx.closePath(); cx.fill();
  // 鉢巻

function drawHeroChoice(item){
  const art = item.key === 'tabby' ? ART.tabbyCatHero : ART.blackCatHero;
  const selected = selectedHero === item.key;
  cx.save();
  cx.globalAlpha = selected ? 1 : 0.68;
  if(selected){
    const pulse = 1 + Math.sin(time*4)*0.05;
    cx.strokeStyle='#ffd75e'; cx.lineWidth=4;
    cx.beginPath(); cx.ellipse(item.x,item.y+3,42*pulse,10*pulse,0,0,Math.PI*2); cx.stroke();
  }
  if(imageReady(art)){

    cx.drawImage(art,item.x-spriteW/2,item.y-item.h,spriteW,item.h);

  cx.fillText(item.label,item.x,item.y+24);
  cx.restore();
}

function drawFishingCatch(en){
  const kind=en.catchKind||'fish';
  const boss=en.type==='boss';
  const big=en.type==='midboss';
  if(boss && imageReady(ART.tunaBoss)){
    const spriteW=Math.min(W*0.72,H<650?220:280);
    const spriteH=ART.tunaBoss.naturalHeight*(spriteW/ART.tunaBoss.naturalWidth);
    const labelY=H<650?-62:-78;
    cx.save();
    cx.imageSmoothingEnabled=false;
    cx.drawImage(ART.tunaBoss,-spriteW/2,-spriteH*0.5,spriteW,spriteH);
    cx.restore();
    numBadge(0,labelY+30,formatPower(en.val),'#fff','#174b6b',H<650?30:34);
    numBadge(0,labelY,'巨大マグロ','#ffd75e','#174b6b',H<650?14:16);
    return;
  }
  const flip=(en.order||0)%2===0?1:-1;
  const fishingArt=FISHING_ART[kind];
  if(imageReady(fishingArt)){
    const maxW=big?(H<650?82:96):(H<650?58:68);
    const maxH=big?(H<650?76:88):(H<650?52:62);
    const artScale=Math.min(maxW/fishingArt.naturalWidth,maxH/fishingArt.naturalHeight);
    const spriteW=fishingArt.naturalWidth*artScale;
    const spriteH=fishingArt.naturalHeight*artScale;
    cx.fillStyle='rgba(0,0,0,0.24)';
    cx.beginPath(); cx.ellipse(0,spriteH*0.42,Math.max(20,spriteW*0.38),6,0,0,Math.PI*2); cx.fill();
    cx.save();
    cx.scale(flip,1);
    cx.imageSmoothingEnabled=false;
    cx.drawImage(fishingArt,-spriteW/2,-spriteH/2,spriteW,spriteH);
    cx.restore();
    const badgeY=-spriteH/2-(big?19:15);
    numBadge(0,badgeY,formatPower(en.val),'#fff',big?'#8a334a':'#1f6275',big?28:24);
    if(big) numBadge(0,badgeY-27,'大物','#fff4cf','#8a334a',13);

  }
  const palette=['#46b7c7','#f0a43c','#ef7188','#5f91d8','#78bd67'];
  const bodyCol=kind==='tuna'?'#2777a8':kind==='bonito'?'#356f91':palette[(en.group||0)%palette.length];

  cx.save(); cx.scale(flip,1);

  if(['fish','bonito','tuna'].includes(kind)){
    const w=kind==='tuna'?106:kind==='bonito'?72:52;
    const h=kind==='tuna'?42:kind==='bonito'?30:24;

    cx.beginPath(); cx.ellipse(0,0,w*0.42,h*0.50,0,0,Math.PI*2); cx.fill();
    cx.strokeStyle=outline; cx.lineWidth=3; cx.stroke();
    cx.beginPath(); cx.moveTo(-w*0.38,0); cx.lineTo(-w*0.60,-h*0.45); cx.lineTo(-w*0.57,h*0.45); cx.closePath(); cx.fill(); cx.stroke();
    cx.fillStyle=kind==='tuna'?'#f0c64e':'rgba(255,255,255,0.45)';
    cx.beginPath(); cx.moveTo(-4,-h*0.42); cx.lineTo(12,-h*0.78); cx.lineTo(18,-h*0.30); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(-2,h*0.42); cx.lineTo(13,h*0.70); cx.lineTo(18,h*0.28); cx.closePath(); cx.fill();
    cx.fillStyle='#f7fbff'; cx.beginPath(); cx.arc(w*0.27,-h*0.10,4,0,Math.PI*2); cx.fill();
    cx.fillStyle='#102332'; cx.beginPath(); cx.arc(w*0.29,-h*0.10,2,0,Math.PI*2); cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.6)'; cx.lineWidth=2;

        cx.beginPath(); cx.moveTo(side*(13+i*4),11); cx.lineTo(side*(24+i*6),24); cx.stroke();

    });
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(-8,-8,4,0,Math.PI*2); cx.arc(8,-8,4,0,Math.PI*2); cx.fill();

  }else if(kind==='shrimp' || kind==='lobster'){

    cx.strokeStyle=lobster?'#b83c35':'#ef7188'; cx.lineWidth=lobster?13:10; cx.lineCap='round';
    cx.beginPath(); cx.arc(-2,0,lobster?24:19,-0.65,2.1); cx.stroke();

        cx.beginPath(); cx.moveTo(side*15,-3); cx.lineTo(side*35,-13); cx.stroke();

  }else{
    const octopus=kind==='octopus';
    cx.fillStyle=octopus?'#d75c77':'#8a70d6'; cx.strokeStyle=outline; cx.lineWidth=3;

    cx.strokeStyle=octopus?'#d75c77':'#8a70d6'; cx.lineWidth=5; cx.lineCap='round';

    }

  cx.restore();
  const badgeY=boss?-55:big?-48:-39;
  numBadge(0,badgeY,formatPower(en.val),'#fff',boss?'#174b6b':big?'#8a334a':'#1f6275',boss?34:big?28:24);
  if(boss) numBadge(0,badgeY-32,'巨大マグロ','#ffd75e','#174b6b',16);
  else if(big) numBadge(0,badgeY-27,'大物','#fff4cf','#8a334a',13);
}

function drawEnemy(en){
  if(en.dead && en.popT>=1) return;
  const screenY=warScreenY(en.y);
  if(gameMode==='war' && (screenY<warTopInset() || screenY>H+100)) return;
  const pop = en.dead ? 1+en.popT*0.6 : 1;
  const alpha = en.dead ? 1-en.popT : 1;
  const bobY = Math.sin(en.bob)*3;
  const shX = en.shake>0 ? Math.sin(time*60)*en.shake : 0;
  cx.save();
  cx.globalAlpha = alpha;
  cx.translate(en.x+shX, screenY+bobY);
  cx.scale(pop,pop);

  if(gameMode==='war'){
    drawFishingCatch(en);
    cx.restore();
    return;

    mg.addColorStop(0,'#d6ff8a'); mg.addColorStop(0.45,'#65c94f'); mg.addColorStop(1,'#2d7b3d');
    cx.fillStyle=mg;
    cx.beginPath();
    cx.moveTo(-9,-21); cx.lineTo(9,-21); cx.lineTo(20,-8);

    cx.closePath(); cx.fill();
    cx.strokeStyle='#1f5c32'; cx.lineWidth=3; cx.stroke();
    cx.strokeStyle='#e34f55'; cx.lineWidth=4;

    cx.fillStyle='#f5ffe7';

      const compact = H < 650 ? 0.82 : 1;
      const maxH = 82*compact, maxW = 100*compact;

      numBadge(0,-spriteH*0.88,gameMode==='war'?'副将':'中ボス','#f0d28b','#17304d',H<650?11:13);
    } else if(!midBoss && imageReady(bambooArt)){

    } else {
      // 門下生は数字だけではなく、同じ顔の小さな侍として描く。

      cx.fillStyle='#22242a';

// ---------- 背景 ----------
function drawImageCoverRect(img,x,y,w,h){
  if(!imageReady(img)) return false;
  const scale=Math.max(w/img.naturalWidth,h/img.naturalHeight);
  const dw=img.naturalWidth*scale;
  const dh=img.naturalHeight*scale;
  cx.save();
  cx.beginPath(); cx.rect(x,y,w,h); cx.clip();
  cx.drawImage(img,x+(w-dw)/2,y+(h-dh)/2,dw,dh);
  cx.restore();
  return true;
}

function drawWarBG(){
  const sectionHeight=warWorldHeight/WAR_GROUPS;
  const tints=[
    'rgba(76,154,114,0.03)','rgba(36,136,126,0.04)','rgba(30,128,132,0.05)',
    'rgba(19,110,128,0.05)','rgba(14,102,130,0.06)','rgba(13,91,126,0.07)',
    'rgba(10,78,119,0.08)','rgba(9,66,110,0.09)','rgba(5,48,94,0.08)',
  ];
  cx.fillStyle='#075f83'; cx.fillRect(0,0,W,H);
  for(let section=0;section<WAR_GROUPS;section++){
    const worldTop=warWorldHeight-(section+1)*sectionHeight;
    const screenTop=worldTop-warCameraY;
    const screenBottom=screenTop+sectionHeight;
    if(screenBottom<0 || screenTop>H) continue;
    const art=section<3 ? ART.fishingRiver : section<8 ? ART.fishingCoast : ART.fishingOcean;
    const oceanOffset=section===WAR_GROUPS-1 ? (H<650?175:220) : 0;
    cx.save();
    if(section%2===1 && section<8){ cx.translate(W,0); cx.scale(-1,1); }
    if(oceanOffset && imageReady(art)){
      const tileH=42;
      for(let y=screenTop;y<screenTop+oceanOffset;y+=tileH){
        cx.drawImage(art,90,0,420,42,0,y,W,Math.min(tileH,screenTop+oceanOffset-y));
      }
    }
    drawImageCoverRect(art,0,screenTop+oceanOffset,W,sectionHeight+1);
    cx.restore();
    cx.fillStyle=tints[section]; cx.fillRect(0,screenTop,W,sectionHeight+1);
  }
  const shade=cx.createLinearGradient(0,0,0,H);
  shade.addColorStop(0,'rgba(3,28,43,0.20)');
  shade.addColorStop(0.45,'rgba(3,28,43,0.02)');
  shade.addColorStop(1,'rgba(3,28,43,0.18)');
  cx.fillStyle=shade; cx.fillRect(0,0,W,H);
}

function drawBG(){
  if(gameMode==='war'){
    drawWarBG();
    return;
  }
  const bg = level >= 6 ? ART.castle : ART.dojo;
  if(imageReady(bg)){
    const scale = Math.max(W/bg.naturalWidth, H/bg.naturalHeight);
    const dw = bg.naturalWidth*scale;
    const dh = bg.naturalHeight*scale;
    cx.drawImage(bg, (W-dw)/2, (H-dh)/2, dw, dh);
  } else {
    cx.fillStyle = level >= 6 ? '#17120f' : '#776936';
    cx.fillRect(0,0,W,H);
  }
  // 数字とキャラの読みやすさを確保する薄い舞台幕。
  const shade = cx.createLinearGradient(0,0,0,H);
  shade.addColorStop(0,'rgba(8,7,6,0.16)');
  shade.addColorStop(0.5,'rgba(8,7,6,0.05)');
  shade.addColorStop(1,'rgba(8,7,6,0.22)');
  cx.fillStyle=shade; cx.fillRect(0,0,W,H);
}

// ---------- UI ----------
function drawHUD(){
  cx.save();
  if(gameMode==='war'){
    const progress=warProgress();
    const percent=Math.round(progress*100);
    cx.fillStyle='rgba(11,29,51,0.82)';
    roundRect(12,12,Math.min(224,W-76),54,8); cx.fill();
    cx.fillStyle='#ffd75e'; cx.font='900 18px '+FONT_JP; cx.textAlign='left'; cx.textBaseline='middle';
    cx.fillText('釣行 '+percent+'%',24,31);
    cx.font='700 11px '+FONT_JP; cx.fillStyle='#f1ead8';
    cx.fillText('大物を追って沖へ',110,31);
    const barW=Math.min(200,W-100);
    cx.fillStyle='rgba(255,255,255,0.16)'; roundRect(24,49,barW,6,3); cx.fill();
    cx.fillStyle='#ffd75e'; roundRect(24,49,Math.max(3,barW*progress),6,3); cx.fill();
    cx.restore();
    return;
  }
  cx.fillStyle='rgba(11,29,51,0.75)';
  roundRect(12,12,176,44,12); cx.fill();
  cx.fillStyle='#ffd75e'; cx.font='900 20px '+FONT_JP; cx.textAlign='left'; cx.textBaseline='middle';
  cx.fillText('修行 '+level, 26, 34);
  cx.font='700 11px '+FONT_JP; cx.fillStyle='#f1ead8';
  cx.fillText(level >= 6 ? '城内' : '道場',132,35);
  cx.restore();
}

function drawOverlay(title, sub, btn, col){
  cx.fillStyle='rgba(11,29,51,0.72)'; cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.font='900 '+Math.min(44,W*0.105)+'px '+FONT_JP;
  cx.lineWidth=10; cx.strokeStyle='#0b1d33'; cx.lineJoin='round';
  cx.strokeText(title, W/2, H*0.4);
  cx.fillStyle=col; cx.fillText(title, W/2, H*0.4);
  cx.font='700 20px '+FONT_JP; cx.fillStyle='#e8eef5';
  const subScale = Math.min(1, (W-32) / Math.max(1,cx.measureText(sub).width));
  cx.font='700 '+Math.max(13,20*subScale)+'px '+FONT_JP;
  cx.fillText(sub, W/2, H*0.4+50);
  const bw=230,bh=62;
  cx.fillStyle=col; roundRect(W/2-bw/2, H*0.56, bw, bh, 16); cx.fill();
  cx.fillStyle='#0b1d33'; cx.font='900 24px '+FONT_JP;
  cx.fillText(btn, W/2, H*0.56+bh/2+2);
}

// ---------- メイン描画 ----------
function draw(){
  cx.save();
  if(shakeScreen>0) cx.translate((Math.random()-0.5)*shakeScreen, (Math.random()-0.5)*shakeScreen);
  drawBG();

  if(state===S.TITLE){
    // タイトル
    cx.textAlign='center';
    const compactTitle = H < 650;
    const bY = Math.sin(time*2)*5;
    const titleY = H*0.3+bY;
    cx.font='900 '+Math.min(48,W*0.13)+'px '+FONT_JP;
    cx.lineWidth=12; cx.strokeStyle='#0b1d33'; cx.lineJoin='round';
    cx.strokeText('猫試し', W/2, titleY-16);
    const tg = cx.createLinearGradient(0,titleY-58,0,titleY);
    tg.addColorStop(0,'#ffe98a'); tg.addColorStop(1,'#ff9d3d');
    cx.fillStyle=tg; cx.fillText('猫試し', W/2, titleY-16);
    cx.font='900 '+Math.min(28,W*0.07)+'px '+FONT_JP;
    cx.lineWidth=8; cx.strokeText('JATA POWER RUSH', W/2, titleY+27);
    cx.fillStyle='#fff4cf'; cx.fillText('JATA POWER RUSH', W/2, titleY+27);
    cx.font='700 '+Math.min(18,W*0.045)+'px '+FONT_JP; cx.fillStyle='#f0d28b';
    cx.fillText('猫侍たちの修行道場', W/2, titleY-68);
    cx.font='700 '+Math.min(17,W*0.041)+'px '+FONT_JP; cx.fillStyle='#e8eef5';
    cx.fillText('自分より小さい数字を選んで力を吸収！', W/2, H*0.45);
    cx.fillText('師範より強くなって修行を突破', W/2, H*0.45+27);
    titleHeroLayout().forEach(drawHeroChoice);
    const blink=(Math.sin(time*4)+1)/2;
    titleModeLayout().forEach(item=>{
      cx.globalAlpha=item.mode==='war'?1:0.82+blink*0.18;
      cx.fillStyle=item.mode==='war'?'#0c6f78':'#a9362a';
      roundRect(item.x-item.w/2,item.y-item.h/2,item.w,item.h,8); cx.fill();
      cx.strokeStyle=item.mode==='war'?'#7df4e8':'#ffd75e'; cx.lineWidth=3;
      roundRect(item.x-item.w/2,item.y-item.h/2,item.w,item.h,8); cx.stroke();
      cx.font='900 '+(compactTitle?16:18)+'px '+FONT_JP;
      cx.fillStyle='#fff4cf'; cx.textBaseline='middle';
      cx.fillText(item.label,item.x,item.y);
    });
    cx.globalAlpha=1;
  } else {
    // 敵（y順ソートで奥→手前）
    const sorted = enemies.slice().sort((a,b)=>a.y-b.y);
    const heroDrawn = {done:false};
    for(const en of sorted){
      if(!heroDrawn.done && player.y < en.y){ drawHeroWithBadge(); heroDrawn.done=true; }
      drawEnemy(en);
    }
    if(!heroDrawn.done) drawHeroWithBadge();

    particles.forEach(pt=>{
      cx.globalAlpha = Math.max(0,pt.life);
      cx.fillStyle = pt.col;
      cx.beginPath(); cx.arc(pt.x,warScreenY(pt.y),pt.size*pt.life,0,Math.PI*2); cx.fill();
    });
    cx.globalAlpha=1;
    floatTexts.forEach(f=>{
      cx.globalAlpha=Math.max(0,f.life);
      numBadge(f.x,warScreenY(f.y),f.txt,f.col,'#0b1d33',30);
    });
    cx.globalAlpha=1;
    drawHUD();

    if(state===S.CLEAR){
      drawOverlay('一本！','パワー '+formatPower(player.power)+' で修行達成！','次の修行 ▶','#7dff8a');
    }
    if(state===S.WAR_END) drawOverlay('大物確保！','最終釣果 '+formatPower(player.power),'エンディング ▶','#7df4e8');
    if(state===S.GAMEOVER){
      if(gameMode==='war') drawOverlay('逃げられた…',(gameOverMsg||'獲物の力が上回った！')+' 釣行 '+Math.round(warProgress()*100)+'%','最初から再挑戦','#ff7a4d');
      else drawOverlay('参った…',(gameOverMsg||'相手のほうが強かった！')+' 修行 '+level,'再挑戦 ↻','#ff7a4d');
    }
  }

  if(flashA>0){ cx.globalAlpha=flashA; cx.fillStyle=flashCol; cx.fillRect(0,0,W,H); cx.globalAlpha=1; }
  cx.restore();
}
function drawHeroWithBadge(){
  const screenY=warScreenY(player.y);
  drawHero(player.x, screenY, player.scale, player.face);
  const g = 1 + Math.min(0.6, Math.log10(Math.max(1,player.power))*0.18);
  numBadge(player.x, screenY - 72*g, formatPower(player.power), '#7dff8a', '#1f3a5f', 30);
}

// ---------- ループ ----------
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05,(now-last)/1000); last=now;
  update(dt); draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
<script>
window.JATA_ARCADE_MENU={
  title:'猫試し | JATA POWER RUSH',
  shareText:'猫侍たちの数字修行「猫試し / JATA POWER RUSH」に挑戦！',
  audioEvent:'power-rush-audio-change',
  toggleAudio:'togglePowerRushAudio',
  audioState:'powerRushAudioEnabled'
};
</script>
<script src="assets/arcade-game-menu.js"></script>
</body>
